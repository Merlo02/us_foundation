# ──────────────────────────────────────────────────────────────────────
# Base model + training config. All experiment YAMLs override a subset
# of these fields; the runner merges ``base.yaml`` with the experiment
# file via OmegaConf.
#
# ETL-specific knobs (resampling caps, etc.) live in ``configs/etl/*.yaml``
# or experiment YAML ``etl:`` overrides — not duplicated here.
# ──────────────────────────────────────────────────────────────────────

data:
  format: hdf5                 # hdf5 | webdataset
  hdf5_dir: /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/backbone_17M_hdf5_wds/raw/hdf5
  wds_root: None

  batch_size: 512
  num_workers: 8
  samples_per_shard: null
  pin_memory: true
  persistent_workers: true

  sampling_strategy: dynamic_epoch     # naive | static | dynamic_epoch | proportional
  dataset_caps: null           # used when sampling_strategy=static
                             # dict mapping base dataset name → max samples per epoch
                             # e.g. {lateral_gastrocnemius_verasonics: 250000, picmus: 5000}
                             # omitted datasets → include all their samples
                             # null / empty → same as naive (no caps)
  epoch_k: 500000              # Exp B3: global LG budget → train/val/test via lg_budget_split_ratios
  lg_budget_split_ratios: [0.8, 0.1, 0.1]  # align with ETL stratified split when possible
  threshold_ratio: 0.1         # Exp B4
  lg_dataset_name: lateral_gastrocnemius_verasonics

  # ── Fixed-S batching (MOIRAI-style patch-count padding) ──────────────
  # If ``target_patches`` is null (default), the DataModule returns signals
  # at native length and MultiTokenizer produces (B, S_max, E) where S_max
  # varies batch-by-batch from max_b(length_b // W_b).
  # If ``target_patches`` is an integer (e.g. 50), long acquisitions are
  # split into deterministic chunks of exactly ``target_patches · W*``
  # samples, short acquisitions yield one chunk with fewer valid patches,
  # and MultiTokenizer outputs exactly (B, target_patches, E). Trailing
  # chunks with fewer than ``min_valid_patches`` real patches are dropped.
  target_patches: null
  min_valid_patches: 1

  # Global stats normalization (requires ETL that writes signal_* stats).
  normalization_type: minmax   # none | zscore | minmax
  norm_eps_z: 1e-6
  norm_eps_mm: 1e-10
  signal_trace_enabled: false
  signal_trace_dir: /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/models/interp_800_ws8_cnn_small/signal_traces

  # Online preprocessing (variable-S only; fixed-S requires ETL offline).
  # preprocessing_mode: raw | bandpass | envelope
  #   "bandpass"  — zero-phase RF bandpass filter using tx_fc_hz from ETL config
  #   "envelope"  — bandpass then Hilbert amplitude demodulation
  # apply_interpolate: if true, resample to a fixed length after the mode step.
  # etl_config_path: required when mode != raw, or when apply_interpolate=true with
  #                  interpolation_from_sassauna=true (sassauna mode reads
  #                  target_length + per-dataset truncate_mode from the ETL config).
  # interpolation_from_sassauna (only consulted when apply_interpolate=true):
  #   true  — legacy behaviour: read target_length + per-dataset truncate_mode
  #           from etl_config_path. Signals longer than target_length are
  #           TRUNCATED (left/right/center), shorter ones are linearly interpolated.
  #   false — strict mode: ignore the ETL config's target_length/truncate_mode and
  #           force-resample every signal to ``strict_target_length`` via np.interp
  #           (no truncation, ever, regardless of native length).
  # strict_target_length: positive int, required when interpolation_from_sassauna=false.
  preprocessing_mode: raw
  apply_interpolate: true
  etl_config_path: /leonardo/home/userexternal/gmerlino/us_foundation/configs/etl/etl_config_sassauna.yaml
  interpolation_from_sassauna: false
  strict_target_length: 800
model:
  # Pretraining architecture:
  #   "mae"    — UltrasonicMAE (tokenizer + encoder + decoder, reconstruction loss)
  #   "lejepa" — UltrasonicJEPA (encoder-only, LeJEPA loss; see model/us_jepa.py).
  #              Uses the ``lejepa:`` block below; ignores the decoder_* /
  #              masking_ratio fields and train.loss_alpha / train.norm_target.
  architecture: mae            # mae | lejepa

  window_sizes: [8]
  target_patch_mm: 0.6
  tokenizer_type: cnn          # mlp | cnn
  cnn_config:
    kernel_size: null          # default: window_size (non-overlapping)
    stride: null               # default: window_size
    groups: 1
    padding: 0
    bias: true

  embed_dim: 256
  encoder_depth: 8
  encoder_heads: 8
  encoder_mlp_ratio: 4.0

  # ── MAE-only (ignored when architecture=lejepa) ──────────────────────
  decoder_dim: 256
  decoder_depth: 4
  decoder_heads: 8
  decoder_mlp_ratio: 4.0

  masking_ratio: 0.5
  # ─────────────────────────────────────────────────────────────────────

  dropout: 0.0

  use_ct_rope: true
  ct_rope_base: 1000000.0

  # ── LeJEPA-only (used when architecture=lejepa; defaults reproduce the
  # BioFoundation LuMamba_pretrain.yaml proportions) ─────────────────────
  # Views are FRACTIONS of each sample's valid patches: signals here have
  # variable native length and per-sample W*, so absolute view widths are
  # not definable. Because one patch ≈ target_patch_mm of tissue depth, a
  # patch fraction is also a depth fraction (BioFoundation: local 4/32 =
  # 0.125, global 16/32 = 0.5 of a constant 1280-step window).
  lejepa:
    num_global_views: 2
    num_local_views: 4
    global_view_ratio: 0.5     # fraction of valid patches per global view
    local_view_ratio: 0.125    # fraction of valid patches per local view
    lambd_lejepa: 0.002        # loss = (1-λ)·sim + λ·SIGReg
    num_slices: 128            # random projections per SIGReg call
    sigreg_log_every_n_epochs: 5   # 2-D SIGReg scatter cadence, rank 0 (0 = off)

train:
  seed: 42
  max_epochs: 400
  warmup_epochs: 10
  lr: 1e-3
  min_lr: 1e-4
  loss_alpha: 0.2
  norm_target: false                # set false when training without per-patch target norm (matches plot denorm)
  weight_decay: 0.05
  betas: [0.9, 0.95]
  gradient_clip_val: 1.0
  precision: bf16-mixed
  accelerator: gpu
  devices: 4
  num_nodes: 1
  accumulate_grad_batches: 1
  log_every_n_steps: 400
  checkpoint_every_n_epochs: 50   # 0 = disabled; set e.g. 50 to save a snapshot every 50 epochs
  val_check_interval: 1.0

  output_dir: /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/models
  run_name: interp_800_ws8_cnn_small         # appended to output_dir; default: train.run_name

  # Weights & Biases — default offline (e.g. CINECA); sync later with ``wandb sync``.
  wandb:
    enabled: true
    offline: true
    project: usf
    name: interp_800_ws8_cnn_small        # default: train.run_name
    entity: null

  # Optional: tokenizer / CT-RoPE trace (rank 0, first & last epoch only).
  # Logs midpoint times + delta between consecutive midpoints (see training_debug).
  debug_pipeline:
    enabled: false
    max_samples_per_base_dataset: 1
    log_interval_batches: 1
    midpoint_log_k: 5

  # ── t-SNE of encoder embeddings (MAE and LeJEPA; see model/embedding_debug.py) ──
  debug_embeddings:
    tsne_embeddings: false     # MASTER switch for ANY t-SNE (both modes below)
    # tsne_mode is a LIST selecting which t-SNE(s) to compute (both run if both
    # are listed). There are two independent modes:
    #   "pretrain" — embeds THIS RUN's first pretraining VALIDATION batch
    #                (data.hdf5_dir/val.h5): mean-pooled encoder output,
    #                coloured by `dataset_source`. Needs NO extra dataset/path;
    #                runs every `every_n_epochs` below. (Points plotted = val
    #                batch_size.) Shows if the encoder is dataset-invariant.
    #   "labeled"  — embeds an EXTERNAL downstream labeled `all.h5` (N,C,T
    #                classification), restricted to one session: each frame is
    #                encoded ONE CHANNEL AT A TIME, the per-channel embeddings
    #                are CONCATENATED into one (C·E) vector per frame (same
    #                representation the downstream t-SNE projects), then t-SNE
    #                coloured by CLASS label. Requires `tsne_labeled_h5`.
    tsne_mode: [labeled]
    every_n_epochs: 10         # cadence (in epochs) for the "pretrain" t-SNE
    tsne_max_steps: 1000       # sklearn TSNE optimisation budget (n_iter/max_iter)
    # The four fields below are used ONLY when "labeled" is in tsne_mode:
    tsne_labeled_h5: /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/downstream/ultrapro/A1_all/all.h5                 # path to a downstream all.h5; if null, "labeled" is skipped
    tsne_labeled_session_id: 1         # which session_id in that file to embed
    tsne_labeled_every_n_epochs: 40       # cadence (in epochs) for the labeled t-SNE
    tsne_labeled_max_samples: 1000        # max frames from the session to embed (t-SNE size cap)
