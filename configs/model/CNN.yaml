# Standalone config — no `defaults:`. Trains the (copied) supervisor's CNN
# (./model/us_CNN.py :: US_CNN_Class) on the same DownstreamDataModule the
# transformer uses, so the comparison is apples-to-apples.

data:
  h5_path: /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/downstream/spacone_forearmbicepsTriceps_gesture_s1/all.h5

  split_mode: intra_session
  test_id: 1
  # grouped_val=false => val is a random val_ratio slice of the non-test pool
  # (val_id MUST be null). Set true to hold out one whole session for val.
  grouped_val: false
  val_id: null
  val_ratio: 0.3
  test_ratio: 0.2
  seed: 42

  # Same normalization the transformer config uses.
  normalization_type: minmax
  norm_eps_z: 1.0e-6
  norm_eps_mm: 1.0e-10

  batch_size: 32
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  shuffle_train: true
  signal_trace_enabled: false
  signal_trace_dir: signal_traces
  target_patches: null

  # Match the transformer pipeline: resample each (C, T_raw) to (C, target_length).
  apply_interpolate: false
  target_length: 397

model:
  # ── DataModule-only fields (NOT used by the CNN). ─────────────────────
  # Required by DownstreamDataModule for patch metadata. Copy these from
  # your base.yaml / pretraining config.yaml so the loader emits the SAME
  # tensors the transformer sees.
  # TODO: paste the actual values from configs/model/base.yaml here.
  window_sizes: [397]          # <-- example; replace with your base.yaml value
  target_patch_mm: 1.0         # <-- example; replace with your base.yaml value

  # ── CNN architecture (paro-paro dalla supervisor) ─────────────────────
  num_channels: 6              # C = num_transducers (must match the .h5 attr)
  num_classes: 6
  us_window_size: 397          # must equal data.target_length
  filters:   [1, 1]
  kernels:   [[7, 1], [7, 1]]
  max_pools: [[4, 1], [4, 1]]
  dropout_rate: 0.05
  head_hidden_mult: 0.5

train:
  seed: 42
  max_epochs: 8
  lr: 1.0e-3
  weight_decay: 0.0
  betas: [0.9, 0.999]
  # No warmup / no scheduler — matches supervisor's train_loop with scheduler=null.

  gradient_clip_val: 0.0
  precision: 32                # supervisor trains in fp32; bf16 would diverge
  accelerator: gpu
  devices: 1                   # supervisor is single-GPU; keep it apples-to-apples
  num_nodes: 1
  accumulate_grad_batches: 1
  log_every_n_steps: 50

  monitor: val/acc
  monitor_mode: max
  save_top_k: 1

  output_dir: /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/models_downstream/cnn_debug
  run_name: cnn_baseline

  wandb:
    enabled: true
    offline: true
    project: us_foundation_downstream
    name: cnn_baseline
    entity: null