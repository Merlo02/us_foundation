# Experiment D тАФ Multi-format ETL output
# --------------------------------------------------------------------
# Set ``output_formats`` in the ETL YAML and re-run ETL. Point ``data`` paths
# at ``<etl_output_dir>/<variant>/hdf5`` or ``.../wds`` (e.g. .../envelope/hdf5).
# --------------------------------------------------------------------

defaults: [base]

etl:
  output_formats:
    raw: false
    envelope: true
    bandpass: false
    interpolate: false

train:
  run_name: exp_D_envelope
