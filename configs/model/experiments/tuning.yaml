# ──────────────────────────────────────────────────────────────────────
# Tuning config for runners/run_tuning_downstream.py.
#
# Mirrors configs/model/base_downstream.yaml field-for-field, but every
# hyperparameter is replaced by a *list of candidate values*. The runner
# takes the Cartesian product of those lists, and for each combination
# launches a full leave-one-session-out cross-validation (one
# runners/run_downstream.py call per held-out session).
#
# Encoding rules
# --------------
#   leaf value is a list  → grid axis; every element is one candidate.
#   leaf value is a scalar → fixed (treated as a 1-element grid axis).
#   "natural-list" fields (window_sizes, betas, lg_budget_split_ratios,
#       cnn_config nested ints, …) MUST be wrapped one level deeper, e.g.
#       ``window_sizes: [[8]]`` to make the WHOLE list a single candidate.
#
# Per-run overrides set by the runner (do NOT put these on the grid)
# ------------------------------------------------------------------
#   data.test_id        — rotated through every unique session_id (or
#                         patient_id if split_mode == intra_patient).
#   data.val_id         — when grouped_val is true, rotated alongside
#                         test_id so val/test never coincide.
#   train.output_dir    — set to ``<base_output_dir>/<sweep_name>/group_i``.
#   train.run_name      — set to ``run_<j>``.
#   train.wandb.group   — set to ``group_<i>`` (one per combination).
#   train.wandb.name    — set to ``run_<j>`` (one per held-out session).
# ──────────────────────────────────────────────────────────────────────

defaults: [base]

data:
  h5_path: "/leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/downstream/spacone_forearmbicepsTriceps_gesture_s1/all.h5"

  # ``intra_session`` => rotate test_id across unique session_id.
  # ``intra_patient`` => rotate across unique patient_id.
  split_mode: ["intra_session"]
  # Rotated by the runner — left as a single placeholder so the YAML is
  # structurally identical to base_downstream.yaml.
  test_id: [null]
  grouped_val: [false]
  val_id: [null]
  val_ratio: [0.3]
  seed: [42]

  normalization_type: ["minmax"]
  norm_eps_z: [1.0e-6]
  norm_eps_mm: [1.0e-10]

  batch_size: [128]
  num_workers: [8]
  pin_memory: [true]
  persistent_workers: [true]
  shuffle_train: [true]

  # target_patches / apply_interpolate / target_length are auto-synced
  # from model.pretrained_dir by runners.run_downstream (and so by
  # every child of this sweep). Override on a per-run basis with
  # ``--override data.target_length=…`` if you really need to.

model:
  num_channels: [6]
  pooling_type: ["mean"]

  head_type: ["classification"]
  num_classes: [6]
  num_outputs: [1]
  head_hidden_dim: [null]

  # Example grid axes — extend / shrink to taste.
  head_dropout: [0.0]
  head_num_layers: [1]

  # Skip the per-test-epoch t-SNE projection (sklearn TSNE + wandb.Image).
  # Single-option list ⇒ fixed, does NOT enlarge the grid. Set [true] to
  # re-enable. Default in code is True, so omitting this keeps t-SNE on.
  tsne_enabled: [false]

  # Pretraining run directory (contains config.yaml + checkpoints/last.ckpt).
  # Add more entries to grid over alternative pretrained runs.
  pretrained_dir: ["/leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/models/interp_exp/interp_800"]

  freeze_encoder: [false]
  layerwise_lr_decay: [0.5] #if you want to test with LoRA always insert 0.0

  # LoRA — each leaf is a candidate list, same convention as the rest of
  # the file. ``target_modules`` is a natural list, so wrap one level
  # deeper for a single candidate. Set ``enabled: [false, true]`` to
  # grid over with/without LoRA.
  lora:
    enabled: [false]
    r: [8]
    lora_alpha: [16]
    lora_dropout: [0.0]
    target_modules: [[qkv, proj, fc1, fc2]]

train:
  seed: [42]
  max_epochs: [8]
  warmup_epochs: [1]
  lr: [5.0e-5]
  min_lr: [1.0e-5]
  warmup_lr_init: [1.0e-5]
  weight_decay: [0.05]
  # ``betas`` is itself a list — wrap one level deeper for a single candidate.
  betas: [[0.9, 0.95]]
  gradient_clip_val: [1.0]
  precision: ["bf16-mixed"]
  accelerator: ["gpu"]
  devices: [4]
  num_nodes: [1]
  accumulate_grad_batches: [1]
  log_every_n_steps: [50]
  val_check_interval: [1.0]
  checkpoint_every_n_epochs: [25]
  test_every_epoch: [false]

  monitor: ["val/acc"]
  monitor_mode: ["max"]
  save_top_k: [1]

  # ``output_dir`` is the SHARED root; the runner appends
  # /<sweep_name>/group_i and writes run_name="run_j" inside.
  output_dir: ["/leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/models_downstream/tuning"]
  run_name: ["interp_800"]

  # ``wandb.project`` / ``wandb.entity`` / ``wandb.offline`` apply to every
  # spawned run; ``group`` and ``name`` are set per-run by the orchestrator.
  wandb:
    group: fullFinetuning_interp800
    enabled: true
    offline: true
    project: us_foundation_downstream_tuning
    entity: null
