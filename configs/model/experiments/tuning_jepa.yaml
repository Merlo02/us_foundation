# ──────────────────────────────────────────────────────────────────────
# Tuning config for runners/run_tuning_downstream.py.
#
# JEPA parallel of tuning_cls.yaml: identical downstream sweep, but the
# encoder is the LeJEPA-pretrained run in
# /leonardo_scratch/.../models/lejepa_FixedS (architecture=lejepa,
# target_patches=50, strict_target_length=800). The downstream runner
# loads the JEPA checkpoint into the (decoder-less) encoder wrapper via the
# shared tokenizer.* / encoder.* state-dict prefixes, and auto-syncs all
# encoder + data-regime fields from model.pretrained_dir.
#
# Mirrors configs/model/base_downstream.yaml field-for-field, but every
# hyperparameter is replaced by a *list of candidate values*. The runner
# takes the Cartesian product of those lists, and for each combination
# launches a full leave-one-session-out cross-validation (one
# runners/run_downstream.py call per held-out session).
#
# Encoding rules
# --------------
#   leaf value is a list  → grid axis; every element is one candidate.
#   leaf value is a scalar → fixed (treated as a 1-element grid axis).
#   "natural-list" fields (window_sizes, betas, lg_budget_split_ratios,
#       cnn_config nested ints, …) MUST be wrapped one level deeper, e.g.
#       ``window_sizes: [[8]]`` to make the WHOLE list a single candidate.
#
# Per-run overrides set by the runner (do NOT put these on the grid)
# ------------------------------------------------------------------
#   data.test_id        — rotated through every unique session_id (or
#                         patient_id if split_mode == intra_patient).
#   data.val_id         — when grouped_val is true, rotated alongside
#                         test_id so val/test never coincide.
#   train.output_dir    — set to ``<base_output_dir>/<sweep_name>/group_i``.
#   train.run_name      — set to ``run_<j>``.
#   train.wandb.group   — set to ``group_<i>`` (one per combination).
#   train.wandb.name    — set to ``run_<j>`` (one per held-out session).
# ──────────────────────────────────────────────────────────────────────

defaults: [base]

data:
  h5_path: "/leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/downstream/spacone_forearmbicepsTriceps_gesture_s1/all.h5"

  # ``intra_session`` => rotate test_id across unique session_id.
  # ``intra_patient`` => rotate across unique patient_id.
  split_mode: ["intra_session"]
  # Rotated by the runner — left as a single placeholder so the YAML is
  # structurally identical to base_downstream.yaml.
  test_id: [null]
  grouped_val: [false]
  val_id: [null]
  val_ratio: [0.3]
  seed: [42]

  normalization_type: ["minmax"]
  norm_eps_z: [1.0e-6]
  norm_eps_mm: [1.0e-10]

  # NOTE: deviates from tuning_cls.yaml (which uses batch_size [512]).
  # Downstream folds channels into the batch — the encoder sees
  # batch_size * num_channels = 64 * 6 = 384 sequences. With full
  # fine-tuning (freeze_encoder=false) all encoder activations are retained
  # for the backward pass; batch_size 512 (= 3072 sequences) OOMs a 64 GB
  # A100. accumulate_grad_batches=8 keeps the effective optimisation batch
  # at 64*8 = 512. Bump batch_size back up (and accumulate down) if you have
  # the memory headroom.
  batch_size: [64]
  num_workers: [8]
  pin_memory: [true]
  persistent_workers: [true]
  shuffle_train: [true]

  # target_patches / apply_interpolate / target_length are auto-synced
  # from model.pretrained_dir by runners.run_downstream (and so by
  # every child of this sweep). Override on a per-run basis with
  # ``--override data.target_length=…`` if you really need to.

model:
  num_channels: [6]
  pooling_type: ["mean"]

  # ── Head: channel-fusion strategy (type) + task ────────────────────
  # ``type`` selects how the C per-channel embeddings (B, C, E) are fused
  # before the final MLP:
  #   concat         — flatten (B, C*E) then MLP (legacy default).
  #   posenc         — add a learnable per-channel positional encoding to each
  #                    E_i, then concat (E_i + P_i) and MLP.
  #   crossattention — add the same learnable P_i, then a single learnable query
  #                    cross-attends over the C channel tokens -> one (B, E)
  #                    vector -> MLP (lightweight, 1 block).
  # ``task`` (classification | regression) selects the output dim + loss
  # (CrossEntropy / MSE). A bare string head_type is still accepted and means
  # ``{type: concat, task: <string>}``.
  #
  # NOTE: posenc / crossattention require model.channel_shuffle=false (the PE is
  # tied to the channel order; shuffling it raises a ValueError at startup).
  head_type:
    type: [concat]              # concat | posenc | crossattention
    task: [classification]      # classification | regression
    # crossattention-only knobs (defaults shown):
    # num_attention_heads: 1
    # num_queries: 6
    # ff_ratio: 1.0
    # attn_dropout: 0.2
    # use_pos_enc: true

  num_classes: [6]
  num_outputs: [1]
  head_hidden_dim: [null]

  # Example grid axes — extend / shrink to taste.
  head_dropout: [0.0]
  head_num_layers: [1]

  # Channel-order augmentation (train-time only): randomly permute each
  # sample's channels (fresh, independent permutation per step) before the
  # head. Set [true] (or [false, true] to grid) to combat inter-session
  # channel-arrangement overfitting. No-op at val/test.
  channel_shuffle: [false]

  # Skip the per-test-epoch t-SNE projection (sklearn TSNE + wandb.Image).
  # Single-option list ⇒ fixed, does NOT enlarge the grid. Set [true] to
  # re-enable. Default in code is True, so omitting this keeps t-SNE on.
  tsne_enabled: [false]

    # Skip the per-validation-epoch confusion-matrix image; [false] => only the
  # test-time image (no matplotlib/wandb render every val epoch during sweeps).
  val_plots_enabled: [false]

  # Pretraining run directory (contains config.yaml + checkpoints/last.ckpt).
  # Here: the LeJEPA FixedS run. Add more entries to grid over alternative
  # pretrained runs (e.g. the variable-S JEPA once it finishes).
  pretrained_dir: ["/leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/models/lejepa/lejepa_interp800_2", "/leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/models/lejepa/lejepa_interp800_3"]

  freeze_encoder: [false]
  layerwise_lr_decay: [0.2] #if you want to test with LoRA always insert 0.0

  # LoRA — each leaf is a candidate list, same convention as the rest of
  # the file. ``target_modules`` is a natural list, so wrap one level
  # deeper for a single candidate. Set ``enabled: [false, true]`` to
  # grid over with/without LoRA.
  lora:
    enabled: [false]
    r: [8]
    lora_alpha: [16]
    lora_dropout: [0.0]
    target_modules: [[qkv, proj, fc1, fc2]]

  # Gradual unfreezing — freeze the backbone (head-only linear probing) for
  # the first ``freeze_epochs`` epochs, then fine-tune the whole model for the
  # rest of train.max_epochs. Each leaf is a candidate list (single-element =>
  # fixed). Mutually exclusive with freeze_encoder=true and lora.enabled=true
  # (such combos are auto-skipped by the orchestrator).
  gradual_unfreezeing:
    enabled: [false]
    freeze_epochs: [5]

train:
  seed: [42]
  max_epochs: [8]
  warmup_epochs: [1]
  lr: [5.0e-4]
  min_lr: [1.0e-4]
  warmup_lr_init: [1.0e-4]
  weight_decay: [0.05]
  # ``betas`` is itself a list — wrap one level deeper for a single candidate.
  betas: [[0.9, 0.95]]
  gradient_clip_val: [1.0]
  precision: ["bf16-mixed"]
  accelerator: ["gpu"]
  devices: [1]
  num_nodes: [1]
  # Keeps the effective optimisation batch at batch_size * 8 = 512 while the
  # per-step memory footprint stays at batch_size=64 (see the data.batch_size
  # note above). tuning_cls.yaml uses [1] with batch_size [512].
  accumulate_grad_batches: [8]
  log_every_n_steps: [50]
  val_check_interval: [1.0]
  checkpoint_every_n_epochs: [25]
  test_every_epoch: [false]

  monitor: ["val/acc"]
  monitor_mode: ["max"]
  save_top_k: [1]
  # Don't rewrite last.ckpt every epoch during the sweep (Lustre write stall);
  # the monitored save_top_k=1 checkpoint already keeps the best model.
  save_last: [true]

  # ``output_dir`` is the SHARED root; the runner appends
  # /<sweep_name>/group_i and writes run_name="run_j" inside.
  output_dir: ["/leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/models_downstream/tuning/finetuning_jepa"]
  run_name: [""]

  # ``wandb.project`` / ``wandb.entity`` / ``wandb.offline`` apply to every
  # spawned run; ``group`` and ``name`` are set per-run by the orchestrator.
  wandb:
    group: fullFinetuning_jepa
    enabled: true
    offline: true
    project: us_foundation_downstream_tuning
    entity: null
