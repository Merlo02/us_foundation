# Experiment A / Mode 1
# --------------------------------------------------------------------
# All signals forcibly resampled to 20 MHz at ETL time, then fed through
# a *single* tokenizer branch (W=16). CT-RoPE is disabled because every
# patch has the same physical depth: classical learned PE (or none) is
# enough.
# --------------------------------------------------------------------

defaults: [base]

etl:
  target_freq_hz: 20_000_000

model:
  window_sizes: [16]
  tokenizer_type: mlp
  use_ct_rope: false

train:
  run_name: exp_A_mode1_resample20MHz
