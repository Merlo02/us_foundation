# ──────────────────────────────────────────────────────────────────────
# Linear probe on a pretrained encoder.
#
# Encoder + tokenizer are loaded from ``pretrained_dir`` (which must
# contain ``config.yaml`` + ``checkpoints/last.ckpt``) and FROZEN
# (eval mode, no_grad in forward). Only the head is trained, with a
# relatively aggressive LR — standard linear-probe recipe.
# ──────────────────────────────────────────────────────────────────────

defaults: [base_downstream]

data:
  h5_path: /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/downstream/spacone_forearmbicep/all.h5
  split_mode: intra_session
  test_id: 6
  val_ratio: 0.1
  seed: 42
  batch_size: 256             # linear probe activations are cheap

model:
  pretrained_dir: /path/to/pretrained_run          # <-- set me
  freeze_encoder: true
  layerwise_lr_decay: null    # ignored when frozen, kept for clarity

  num_channels: 2             # Spacone with channels_to_exclude=[0..3] keeps tx_4/tx_5
  head_type: classification
  num_classes: 6              # cilinder ∪ pouring ∪ pinch gesture set
  head_num_layers: 1          # 1 = pure linear probe

train:
  lr: 5.0e-3
  weight_decay: 0.0           # standard for linear probe
  warmup_epochs: 2
  max_epochs: 60
  monitor: val/acc
  monitor_mode: max
  run_name: cls_linear_probe
