# ──────────────────────────────────────────────────────────────────────
# FROM-SCRATCH transformer on ULTRAPRO — intra-session per (patient, session).
#
# SELF-CONTAINED: the whole encoder architecture is defined HERE
# (``model.pretrained_dir: null`` ⇒ no checkpoint, no _sync_from_pretrained),
# so base.yaml's encoder size is NOT inherited. Vary the from-scratch encoder
# straight from this file (embed_dim / encoder_depth / window_sizes). You can
# keep pretraining or other runs on base.yaml in parallel — they are untouched.
#
# Launch with the tuning orchestrator (1 GPU per run, no DDP):
#   python -m runners.run_tuning_downstream \
#       --config configs/model/experiments/tuning_cls_ultrapro.yaml
#
# Grid convention (run_tuning_downstream): every leaf that is a LIST is a grid
# axis (Cartesian product); a scalar / 1-element list contributes 1.
#   - the ONLY multi-value axis here is data.h5_path → 12 (patient, session) sets
#     ⇒ 12 runs (split_mode=random ⇒ no inner LOSO, one run per set).
#   - "natural list" fields (window_sizes, betas) are DOUBLE-wrapped ``[[...]]``
#     so they stay a SINGLE candidate and don't blow up the grid.
#   - embed_dim / encoder_depth are 1-element lists → extend them to sweep the
#     encoder size, e.g. ``embed_dim: [128, 256, 512]`` (12 × N runs).
#
# Size note: embed_dim=256, encoder_depth=6, heads=8, mlp_ratio=4, ws=8
#            ≈ 4.75M params (encoder dominates: ~12·E²·depth). "circa 5M".
# ──────────────────────────────────────────────────────────────────────

defaults: [base]

data:
  # 12 single-(patient, session) corpora: A1_S1 … A4_S3. One run per set.
  h5_path:
    - /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/downstream/ultrapro/A1_S1/all.h5
    - /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/downstream/ultrapro/A1_S2/all.h5
    - /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/downstream/ultrapro/A1_S3/all.h5
    - /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/downstream/ultrapro/A2_S1/all.h5
    - /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/downstream/ultrapro/A2_S2/all.h5
    - /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/downstream/ultrapro/A2_S3/all.h5
    - /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/downstream/ultrapro/A3_S1/all.h5
    - /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/downstream/ultrapro/A3_S2/all.h5
    - /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/downstream/ultrapro/A3_S3/all.h5
    - /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/downstream/ultrapro/A4_S1/all.h5
    - /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/downstream/ultrapro/A4_S2/all.h5
    - /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/downstream/ultrapro/A4_S3/all.h5

  # intra-session: random iid split WITHIN each (patient, session) set
  # (matches the CNN baseline protocol on ULTRAPRO). No LOSO here.
  split_mode: [random]
  test_id: [null]
  val_id: [null]
  grouped_val: [false]
  test_ratio: [0.2]
  val_ratio: [0.3]
  seed: [42]

  normalization_type: [minmax]
  norm_eps_z: [1.0e-6]
  norm_eps_mm: [1.0e-10]

  batch_size: [32]
  num_workers: [8]
  pin_memory: [true]
  persistent_workers: [true]
  shuffle_train: [true]

  # Input regime defined HERE (not inherited): native length, no interpolation
  # — same as the CNN baseline on ULTRAPRO (C=8, T=998). No fixed-S chunking.
  apply_interpolate: [false]
  target_patches: [null]

model:
  # ── From-scratch: NO pretrained encoder ────────────────────────────
  pretrained_dir: [null]
  freeze_encoder: [false]
  layerwise_lr_decay: [null]    # from scratch → uniform LR (no MAE layerwise decay)

  # ── Encoder architecture — the knobs to vary for the size sweep ─────
  # head_dim = embed_dim / encoder_heads MUST be even (CT-RoPE requires it)
  # and embed_dim divisible by encoder_heads. ~5M ⇒ embed_dim=256, depth=6.
  embed_dim: [256]
  encoder_depth: [8]
  encoder_heads: [8]
  encoder_mlp_ratio: [4.0]
  window_sizes: [[8]]           # DOUBLE-wrapped ⇒ single candidate [8] (S = 998//8 ≈ 124 tokens)
  target_patch_mm: [0.6]
  tokenizer_type: [mlp]         # mlp | cnn (non-overlapping; mlp ≈ cnn here)
  use_ct_rope: [true]
  ct_rope_base: [10000.0]       # the value used by the good interp_800 models
  rope_max_seq_len: [512]
  dropout: [0.0]

  # ── Downstream head ────────────────────────────────────────────────
  num_channels: [8]
  num_classes: [6]
  num_outputs: [1]
  pooling_type: [max]           # best readout on ULTRAPRO intra-session
  head_type:
    type: concat                # concat | posenc | crossattention
    task: classification
  head_hidden_dim: [null]       # null ⇒ single nn.Linear (head_num_layers=1)
  head_dropout: [0.0]
  head_num_layers: [1]
  channel_shuffle: [false]

  tsne_enabled: [false]
  val_plots_enabled: [false]

train:
  seed: [42]
  max_epochs: [50]
  warmup_epochs: [2]
  lr: [5.0e-4]                  # proven to converge for from-scratch on this codebase (interp800_small); bump/sweep if needed
  min_lr: [1.0e-4]
  warmup_lr_init: [1.0e-4]
  weight_decay: [0.05]
  betas: [[0.9, 0.95]]          # DOUBLE-wrapped ⇒ single candidate
  gradient_clip_val: [1.0]
  precision: [bf16-mixed]
  accelerator: [gpu]
  devices: [1]                  # orchestrator forces 1 GPU/run anyway
  num_nodes: [1]
  accumulate_grad_batches: [1]
  log_every_n_steps: [50]
  val_check_interval: [1.0]
  checkpoint_every_n_epochs: [0]
  test_every_epoch: [false]

  monitor: [val/acc]
  monitor_mode: [max]
  save_top_k: [1]
  save_last: [false]            # tiny model, but keep only the best ckpt per run

  # SHARED root; the orchestrator appends /<sweep_name>/group_i/run_j.
  # NB: verify free space (scratch was full earlier) or point this to /leonardo_work.
  output_dir: ["/leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/models_downstream/ultrapro/fromscratch_5M"]
  run_name: [""]

  wandb:
    group: ultrapro_fromscratch_5M
    enabled: false
    offline: true
    project: us_foundation_downstream
    entity: null
