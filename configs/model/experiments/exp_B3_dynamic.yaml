# Experiment B3 — Dynamic epoch-based subsampling (HDF5 only)
# --------------------------------------------------------------------
# At every epoch the DataModule draws ``epoch_k`` fresh random samples
# from the lateral-gastrocnemius pool and unions them with all other
# samples. Requires HDF5 (WebDataset's sequential-stream contract
# forbids per-epoch random subsampling).
# --------------------------------------------------------------------

defaults: [base]

data:
  format: hdf5
  sampling_strategy: dynamic_epoch
  epoch_k: 500000

train:
  run_name: exp_B3_dynamic_epoch500k
