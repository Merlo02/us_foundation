# ──────────────────────────────────────────────────────────────────────
# Base downstream config (classification / regression).
#
# Pulls encoder hyper-parameters from configs/model/base.yaml via the
# ``defaults: [base]`` mechanism. Override only what's task-specific.
# ──────────────────────────────────────────────────────────────────────

defaults: [base]

data:
  # Single corpus HDF5 file produced by etl_downstream (no train/val/test
  # splits on disk — splitting happens in DownstreamDataModule.setup()).
  h5_path: /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/train_data/downstream/spacone_forearmbicepsTriceps_gesture_s1/all.h5

  # Split strategy. Three modes are supported:
  #
  #   intra_session — test = rows where session_id == test_id; one OTHER
  #                   session is held out WHOLE for validation (val_id if
  #                   set, else one auto-picked from the seed). Validation
  #                   is grouped, never a random slice of the train sessions
  #                   (adjacent frames are near-duplicates, so a random slice
  #                   leaks from train and inflates val accuracy).
  #   intra_patient — same logic, partitioned by patient_id.
  #   random        — iid split across all rows (test_ratio / val_ratio).
  split_mode: intra_session
  test_id: 2
  # ── Validation source (intra_session / intra_patient only) ──────────
  # grouped_val=true  => hold out one OTHER group (session / patient) WHOLE
  #                      for validation. Uses val_id if set, else auto-picks
  #                      one non-test group deterministically from the seed.
  #                      Use this when you have enough groups to spare one;
  #                      val accuracy then tracks the grouped test accuracy.
  # grouped_val=false => val is a random val_ratio slice of the non-test
  #                      pool (iid within the pool — same as random mode,
  #                      only the test split stays grouped). val_id MUST be
  #                      null. Use this when groups are too few to spare
  #                      one, accepting that train↔val share groups and
  #                      val will overestimate accuracy.
  grouped_val: false
  # Validation group held out whole (session_id / patient_id per split_mode).
  # null => auto-pick one non-test group deterministically from the seed.
  # Ignored when grouped_val=false (must be null in that case).
  val_id: null
  # val_ratio semantics depend on the mode:
  #   - random mode               => fraction of all rows used for val.
  #   - grouped + grouped_val=true => on/off switch (0 => no val; >0 => hold
  #                                  out one whole group as above).
  #   - grouped + grouped_val=false => fraction of the non-test pool used
  #                                   for val (must be in (0, 1) or 0 to skip).
  val_ratio: 0.3
  seed: 42

  # ── Normalization (match pretraining) ───────────────────────────────
  # Applied per frame after interpolation, using the same formula as the
  # pretraining loader (transforms.normalization.normalize_signal_numpy).
  # Stats are computed per frame over the whole (C, T) array (shared across
  # channels). Set this to the value the pretrained encoder was trained on
  # (see the pretraining run's config.yaml). none | zscore | minmax
  normalization_type: minmax
  norm_eps_z: 1e-6
  norm_eps_mm: 1e-10

  batch_size: 32
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  shuffle_train: true

  # ── Input-regime fields auto-synced from model.pretrained_dir ──────
  # ``target_patches``, ``apply_interpolate`` and ``target_length`` MUST
  # match what the encoder saw during pretraining, otherwise the
  # attention distribution shifts and the checkpoint becomes useless. To
  # avoid duplicating the values, runners.run_downstream reads them from
  # ``<pretrained_dir>/config.yaml`` at startup (see
  # ``_DATA_FIELDS_FROM_PRETRAINED``). For the from-scratch ablation
  # (``pretrained_dir: null``) they fall back to base.yaml — where
  # ``data.strict_target_length`` is renamed to ``data.target_length``
  # so the downstream loader sees a usable value uniformly.
  #
  # Override either via the CLI:
  #   --override data.target_length=1200 data.apply_interpolate=false

model:
  # Encoder hyper-parameters: by default inherited from base.yaml. If
  # ``pretrained_dir`` is set below, the runner overrides every encoder
  # field (window_sizes, embed_dim, depth, heads, target_patch_mm, …) with
  # the values from ``<pretrained_dir>/config.yaml`` so the architecture
  # matches the checkpoint. Downstream-only fields below are never touched
  # by that sync.

  # ── Downstream-specific ───────────────────────────────────────────
  num_channels: 6           # C — must match the .h5 attr num_channels
  pooling_type: mean        # mean (others wired via build_pooling later)

  head_type: classification  # classification | regression
  num_classes: 6            # required when head_type == "classification"
  num_outputs: 1            # required when head_type == "regression"
  head_hidden_dim: null     # null => single nn.Linear; int => MLP hidden dim
  head_dropout: 0.5
  head_num_layers: 1        # 1 = linear probe head; >1 = MLP

  # Per-test-epoch t-SNE of the pooled encoder embeddings, logged as a
  # wandb.Image (classification only). Set false to skip the sklearn
  # projection + plotting at test time (e.g. during hyperparameter sweeps).
  tsne_enabled: true

  # ── Transfer-learning mode ─────────────────────────────────────────
  # Path to the pretraining run directory. The runner expects the
  # standard layout written by runners.run_train, i.e.
  #   <pretrained_dir>/config.yaml
  #   <pretrained_dir>/checkpoints/last.ckpt
  # Both files are loaded automatically: config.yaml drives the encoder
  # + data-regime sync (_sync_from_pretrained), last.ckpt is fed to
  # UltrasonicDownstream as the tokenizer + encoder weights.
  # Set to null to run the from-scratch ablation (random init).
  pretrained_dir: "/leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/models/interp_exp/interp_800"
  # True  -> linear probe (encoder frozen + eval + no_grad).
  # False -> fine-tune (whole model trainable).
  freeze_encoder: False

  # Optional MAE fine-tune recipe (He et al. 2021). Try 0.65–0.75. ``null``
  # disables it and uses a uniform LR. Ignored when freeze_encoder=true.
  layerwise_lr_decay: 0.5

  # ── LoRA fine-tune (PEFT) ─────────────────────────────────────────
  # When ``enabled`` is true, the encoder transformer stack is wrapped
  # with LoRA adapters (peft.get_peft_model) right after the pretrained
  # checkpoint is loaded; PEFT freezes the base encoder and only the
  # tiny ``lora_A``/``lora_B`` matrices train. ``layerwise_lr_decay`` is
  # ignored in that mode (uniform LR — the LoRA recipe). At end of
  # training the adapter weights are written separately to
  # ``<run_dir>/lora_adapter/`` so the small adapter file can be shipped
  # independently of the full checkpoint.
  #
  # Setting ``enabled: false`` (or omitting the whole block) leaves the
  # pipeline byte-identical to the previous fine-tune / linear-probe
  # behaviour — no PEFT import is performed in that case.
  lora:
    enabled: false
    r: 8                       # LoRA rank (effective bottleneck width)
    lora_alpha: 16             # scaling factor → LR multiplier alpha/r
    lora_dropout: 0.0
    # nn.Linear suffix names within encoder_wrapper.encoder to wrap.
    # The encoder has qkv + proj in each attention block and fc1 + fc2
    # in each MLP — these four names cover the full block.
    target_modules: [qkv, proj, fc1, fc2]

train:
  seed: 42
  max_epochs: 10
  warmup_epochs: 5
  lr: 1.0e-4
  min_lr: 1.0e-5
  warmup_lr_init: 1.0e-4
  weight_decay: 0.05
  betas: [0.9, 0.95]
  gradient_clip_val: 1.0
  precision: bf16-mixed
  accelerator: gpu
  devices: 4
  num_nodes: 1
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  val_check_interval: 1.0
  checkpoint_every_n_epochs: 25
  # If true, the test set is evaluated at the end of every validation epoch
  # in addition to the final trainer.test() call. Implemented by returning
  # [val_loader, test_loader] from DownstreamDataModule.val_dataloader and
  # dispatching dataloader_idx in UltrasonicDownstream.validation_step;
  # metrics land under val/* and test/* (no /dataloader_idx_N suffix).
  # Useful for diagnostics (track the real held-out generalization at every
  # epoch) but doubles the eval-time cost.
  test_every_epoch: true

  # ModelCheckpoint monitor. For classification use ``val/acc`` (mode max),
  # for regression use ``val/mae`` (mode min).
  monitor: val/acc
  monitor_mode: max
  save_top_k: 1

  output_dir: /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/models_downstream/LinearProbing
  run_name: interp_800

  wandb:
    enabled: true
    offline: true
    project: us_foundation_downstream
    name: interp_800
    entity: null