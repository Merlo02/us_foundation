# ──────────────────────────────────────────────────────────────────────
# Base downstream config (classification / regression).
#
# Pulls encoder hyper-parameters from configs/model/base.yaml via the
# ``defaults: [base]`` mechanism. Override only what's task-specific.
# ──────────────────────────────────────────────────────────────────────

defaults: [base]

data:
  # Single corpus HDF5 file produced by etl_downstream (no train/val/test
  # splits on disk — splitting happens in DownstreamDataModule.setup()).
  h5_path: /path/to/downstream/<dataset>/all.h5

  # Split strategy. Two modes are supported:
  #
  #   intra_session — test = rows where session_id == test_id;
  #                   train+val pulled from the remaining sessions and
  #                   randomly split by val_ratio.
  #   intra_patient — same logic, partitioned by patient_id.
  split_mode: intra_session
  test_id: 6
  val_ratio: 0.1
  seed: 42

  batch_size: 64
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  shuffle_train: true

  # MOIRAI-style fixed-S batching. Must match model.target_patches if set.
  target_patches: null

model:
  # Encoder hyper-parameters are inherited from base.yaml. Override here
  # only if the downstream encoder must differ from the pretraining one
  # (typically you don't — keep them in sync so a pretrained ckpt loads).

  # ── Downstream-specific ───────────────────────────────────────────
  num_channels: 1           # C — must match the .h5 attr num_channels
  pooling_type: mean        # mean (others wired via build_pooling later)

  head_type: classification  # classification | regression
  num_classes: 2            # required when head_type == "classification"
  num_outputs: 1            # required when head_type == "regression"
  head_hidden_dim: null     # null => single nn.Linear; int => MLP hidden dim
  head_dropout: 0.0
  head_num_layers: 1        # 1 = linear probe head; >1 = MLP

  # ── Transfer-learning mode ─────────────────────────────────────────
  # Set to a path to load tokenizer + encoder weights from a pretraining
  # checkpoint. Set to null for random init (from-scratch ablation).
  pretrained_ckpt: null

  # True  -> linear probe (encoder frozen + eval + no_grad).
  # False -> fine-tune (whole model trainable).
  freeze_encoder: false

  # Optional MAE fine-tune recipe (He et al. 2021). Try 0.65–0.75. ``null``
  # disables it and uses a uniform LR. Ignored when freeze_encoder=true.
  layerwise_lr_decay: null

train:
  seed: 42
  max_epochs: 100
  warmup_epochs: 5
  lr: 1.0e-3
  min_lr: 1.0e-6
  warmup_lr_init: 1.0e-6
  weight_decay: 0.05
  betas: [0.9, 0.95]
  gradient_clip_val: 1.0
  precision: bf16-mixed
  accelerator: gpu
  devices: 1
  num_nodes: 1
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  val_check_interval: 1.0
  checkpoint_every_n_epochs: 0

  # ModelCheckpoint monitor. For classification use ``val/acc`` (mode max),
  # for regression use ``val/mae`` (mode min).
  monitor: val/acc
  monitor_mode: max
  save_top_k: 3

  output_dir: /leonardo_scratch/fast/IscrB_WearUsFM/gmerlino/downstream
  run_name: downstream_default

  wandb:
    enabled: false
    offline: true
    project: us_foundation_downstream
    name: null
    entity: null
