# ──────────────────────────────────────────────────────────────────────
# Example ETL configuration for ultrasound A-mode foundation model
# ──────────────────────────────────────────────────────────────────────

# ``target_length``: when ``output_formats.interpolate`` is enabled, every
# written signal has exactly this length (shorter traces → linear interpolation
# to ``target_length``; longer → truncated). Use global
# ``interpolation_truncate_mode`` or override per dataset via
# ``extra.interpolation_truncate_mode`` (``left`` = keep first samples;
# ``right`` = keep last; ``center`` = centered window).
target_length: 1250
truncation_mode: left          # legacy / unused by interpolate path
output_dir: /scratch/us_shards
output_format: both            # webdataset | hdf5 | both

# WebDataset shard sizing (constrained setup for CINECA Leonardo)
samples_per_shard: 1024
batch_size: 64
world_size: 16                 # n_nodes(4) * gpus_per_node(4)
num_workers: 4

# Train / val / test split ratios (applied at sample level)
split_ratios:
  train: 0.8
  val: 0.1
  test: 0.1

seed: 42

# Debug QA: how many example plots to save per (dataset, channel) pair
debug_samples_per_class: 100

# Discard flat / near-zero RMS signals before writing (after standardize + sanitize)
min_signal_energy: 1.0e-6

# ──────────────────────────────────────────────────────────────────────
# Multi-format output (Experiment D): enable concurrent variants; each under
# ``<output_dir>/raw|envelope|bandpass|interpolated/``.
# ──────────────────────────────────────────────────────────────────────
output_formats:
  raw: true
  envelope: false
  bandpass: false
  interpolate: false
interpolation_truncate_mode: left   # left | right | center (for interpolate only)
# Passband width = rf_bandwidth_fraction × ``extra.transmit_center_frequency_hz``
# (symmetric around fc). Override per dataset with ``extra.rf_bandwidth_fraction``.
rf_bandwidth_fraction: 0.8
bandpass_order: 4

# ──────────────────────────────────────────────────────────────────────
# Static subsampling (Experiment B2)
# ──────────────────────────────────────────────────────────────────────
# Cap the number of samples kept per base dataset name. Leave empty for B1.
max_samples_per_dataset: {}
# Example:
#   max_samples_per_dataset:
#     lateral_gastrocnemius_verasonics: 500000

# Auto-fill last WebDataset shard with random duplicates from the same split,
# flagged ``is_filler=true`` in metadata. Prevents NCCL hangs under DDP.
pad_last_shard: true

# ──────────────────────────────────────────────────────────────────────
# Source datasets — every dataset MUST declare ``sampling_frequency_hz`` in
# ``extra``. When ``output_formats`` enables ``envelope`` or ``bandpass``, also
# set ``extra.transmit_center_frequency_hz`` (or ``tx_fc_hz``). Optional:
# ``extra.interpolation_truncate_mode`` (e.g. ``right`` for PICMUS in vivo heart),
# ``extra.rf_bandwidth_fraction``. For ``output_formats.raw`` / ``envelope``: optional
# ``extra.truncate_signal_length`` (crop longer outputs to N samples; shorter unchanged)
# and ``extra.truncate_signal_mode`` (``left`` | ``right`` | ``center``; default =
# global ``interpolation_truncate_mode``). Does not affect ``bandpass`` or ``interpolate``.
# ──────────────────────────────────────────────────────────────────────

datasets:
  - name: hwc
    processor: HWCProcessor
    input_path: /baltic/users/ml_datasets/Ultrasound/HWC_data/data_class/
    channels_to_exclude: []
    extra:
      sampling_frequency_hz: 10_000_000
      transmit_center_frequency_hz: 2_250_000

  - name: grawus
    processor: GRAWUSProcessor
    input_path: /baltic/users/ml_datasets/Ultrasound/IIS_internal/vostrikov_grawus_2023/data
    channels_to_exclude: [4, 7]
    extra:
      sampling_frequency_hz: 10_000_000
      transmit_center_frequency_hz: 2_250_000
      n_channels: 8
      metadata_rows: 4
