# ──────────────────────────────────────────────────────────────────────
# ETL config for testing on sassauna server
# ──────────────────────────────────────────────────────────────────────

target_length: 1400
# Legacy field (not used by the interpolate path). Interpolation uses
# ``target_length`` plus ``interpolation_truncate_mode`` and per-dataset
# ``extra.interpolation_truncate_mode``.
truncation_mode: left
output_dir: /scratch2/msc26f8/data/smoke_test
output_format: both

samples_per_shard: 2560
batch_size: 128
world_size: 16
num_workers: 4
hdf5_chunk_mb: 16

split_ratios:
  train: 0.8
  val: 0.1
  test: 0.1

seed: 42
debug_samples_per_class: 20

# ──────────────────────────────────────────────────────────────────────
# Multi-format output (Experiment D): one or more ``True``; each gets a subdir
# under ``output_dir`` (e.g. raw/, envelope/, interpolated/).
# ──────────────────────────────────────────────────────────────────────
output_formats:
  raw: true
  envelope: false
  bandpass: false
  interpolate: true
# Long signals: default truncation mode when a dataset does not set
# ``extra.interpolation_truncate_mode`` (left | right | center).
interpolation_truncate_mode: left
# Fractional bandwidth around each dataset's ``extra.transmit_center_frequency_hz``:
# passband width = rf_bandwidth_fraction × fc (override per dataset in ``extra``).
rf_bandwidth_fraction: 0.8
bandpass_order: 4

# ──────────────────────────────────────────────────────────────────────
# Static subsampling (Experiment B2): cap per base_dataset at ETL time.
# Toy run: 1000 samples per dataset, 2000 for lateral gastrocnemius.
# ──────────────────────────────────────────────────────────────────────
max_samples_per_dataset:
  hwc: 1000
  grawus: 1000
  lateral_gastrocnemius_verasonics: 2000
  picmus_carotid_long: 1000
  picmus_carotid_cross: 1000
  braush_contraction: 1000
  braush_fatigue: 1000
  picmus_in_vivo_heart: 1000
  giordano_heartrate: 1000

# Auto-fill last WebDataset shard with random duplicates from the same split,
# marked with ``"is_filler": true`` in metadata. Prevents NCCL hangs.
pad_last_shard: true

# ──────────────────────────────────────────────────────────────────────
# Source datasets
# ──────────────────────────────────────────────────────────────────────

datasets:
  - name: hwc
    processor: HWCProcessor
    input_path: /baltic/users/ml_datasets/Ultrasound/HWC_data/data_class/
    channels_to_exclude: []
    extra:
      sampling_frequency_hz: 8_000_000
      transmit_center_frequency_hz: 2_250_000

  - name: grawus
    processor: GRAWUSProcessor
    input_path: /baltic/users/ml_datasets/Ultrasound/IIS_internal/vostrikov_grawus_2023/data
    channels_to_exclude: [4, 7]
    extra:
      sampling_frequency_hz: 8_000_000
      transmit_center_frequency_hz: 2_250_000
      n_channels: 8
      metadata_rows: 4

  - name: lateral_gastrocnemius_verasonics
    processor: LateralGastrocnemiusVerasonicsProcessor
    input_path: /baltic/users/ml_datasets/Ultrasound/IIS_internal/2021_12_LateralGastrocnemius_verasonics/data
