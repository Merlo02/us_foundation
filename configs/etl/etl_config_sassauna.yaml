# ──────────────────────────────────────────────────────────────────────
# ETL config for testing on sassauna server
# ──────────────────────────────────────────────────────────────────────

target_length: None
truncation_mode: left
output_dir: /scratch2/msc26f8/data/exp_A2B3
output_format: hdf5

#samples_per_shard: None
#batch_size: None
#world_size: None
#num_workers: None
hdf5_chunk_mb: 16

split_ratios:
  train: 0.8
  val: 0.1
  test: 0.1

seed: 42
debug_samples_per_class: 20

# ──────────────────────────────────────────────────────────────────────
# Preprocessing (Experiment D)
#   raw       → unchanged RF signal
#   envelope  → Hilbert-transform envelope
#   bandpass  → Butterworth band-pass (requires sampling_frequency_hz per dataset)
# ──────────────────────────────────────────────────────────────────────
preprocessing_mode: raw
#bandpass_low_hz: None
#bandpass_high_hz: None
#bandpass_order: None

# ──────────────────────────────────────────────────────────────────────
# Static subsampling (Experiment B2): cap per base_dataset at ETL time.
# Toy run: 1000 samples per dataset, 2000 for lateral gastrocnemius.
# ──────────────────────────────────────────────────────────────────────
#max_samples_per_dataset:
  # hwc: 1000
  # grawus: 1000
  #lateral_gastrocnemius_verasonics: 250000
  # picmus_carotid_long: 1000
  # picmus_carotid_cross: 1000
  # braush_contraction: 1000
  # braush_fatigue: 1000
  # picmus_in_vivo_heart: 1000
  # giordano_heartrate: 1000

# Auto-fill last WebDataset shard with random duplicates from the same split,
# marked with ``"is_filler": true`` in metadata. Prevents NCCL hangs.
pad_last_shard: false

# ──────────────────────────────────────────────────────────────────────
# Source datasets
# ──────────────────────────────────────────────────────────────────────

datasets:
  - name: hwc
    processor: HWCProcessor
    input_path: /baltic/users/ml_datasets/Ultrasound/HWC_data/data_class/
    channels_to_exclude: []
    extra:
      sampling_frequency_hz: 8_000_000

  - name: grawus
    processor: GRAWUSProcessor
    input_path: /baltic/users/ml_datasets/Ultrasound/IIS_internal/vostrikov_grawus_2023/data
    channels_to_exclude: [4, 7]
    extra:
      sampling_frequency_hz: 8_000_000
      n_channels: 8
      metadata_rows: 4

  - name: lateral_gastrocnemius_verasonics
    processor: LateralGastrocnemiusVerasonicsProcessor
    input_path: /baltic/users/ml_datasets/Ultrasound/IIS_internal/2021_12_LateralGastrocnemius_verasonics/data
    channels_to_exclude:
      # 72:78
      - 72
      - 73
      - 74
      - 75
      - 76
      - 77
      - 78
      # 87:111
      - 87
      - 88
      - 89
      - 90
      - 91
      - 92
      - 93
      - 94
      - 95
      - 96
      - 97
      - 98
      - 99
      - 100
      - 101
      - 102
      - 103
      - 104
      - 105
      - 106
      - 107
      - 108
      - 109
      - 110
      - 111
      # 136:143
      - 136
      - 137
      - 138
      - 139
      - 140
      - 141
      - 142
      - 143
      # 152:163
      - 152
      - 153
      - 154
      - 155
      - 156
      - 157
      - 158
      - 159
      - 160
      - 161
      - 162
      - 163
      # 167:170
      - 167
      - 168
      - 169
      - 170
      # 172:179
      - 172
      - 173
      - 174
      - 175
      - 176
      - 177
      - 178
      - 179
    extra:
      sampling_frequency_hz: 20_000_000
      glob_pattern: "session_*/*.mat"
      pw_divisor_len: 800
      samples_actual: 768
      exclude_sessions: ["session_2_1"]
      exclude_files_by_session:
        session_1:
          - exp_1.mat
          - exp_2.mat
      num_ch_debug_plot_limit: 10

  - name: picmus_carotid_long
    processor: PICMUSCarotidLongProcessor
    input_path: /scratch2/msc26f8/raw_data/PICMUS/PICMUS_carotid_long.uff
    channels_to_exclude: []
    extra:
      sampling_frequency_hz: 20_832_000
      h5_group: /channel_data
      num_ch_debug_plot_limit: 10

  - name: picmus_carotid_cross
    processor: PICMUSCarotidCrossProcessor
    input_path: /scratch2/msc26f8/raw_data/PICMUS/PICMUS_carotid_cross.uff
    channels_to_exclude: []
    extra:
      sampling_frequency_hz: 20_832_000
      h5_group: /channel_data
      num_ch_debug_plot_limit: 10

  - name: braush_contraction
    processor: BraushContractionProcessor
    input_path: /baltic/users/ml_datasets/Ultrasound/Ultrasound_external/braush_contraction_22
    channels_to_exclude: []
    extra:
      sampling_frequency_hz: 40_960_000
      arff_header_lines: 16
      glob_pattern: completeDatabase.arff

  - name: braush_fatigue
    processor: BraushFatigueProcessor
    input_path: /baltic/users/ml_datasets/Ultrasound/Ultrasound_external/braush_fatigue_22/braush_fatigue_dataset.zip
    channels_to_exclude: []
    extra:
      sampling_frequency_hz: 40_960_000

  - name: picmus_in_vivo_heart
    processor: PICMUSInVivoHeartProcessor
    input_path: /scratch2/msc26f8/raw_data/PICMUS/In_vivo_heart.uff
    channels_to_exclude: []
    extra:
      sampling_frequency_hz: 12_000_000
      h5_dataset: /channel_data/data
      end_idx: null
      num_ch_debug_plot_limit: 10

  - name: giordano_heartrate
    processor: GiordanoHeartrateProcessor
    input_path: /baltic/users/ml_datasets/Ultrasound/IIS_internal/giordano_heartrate_2024/raw
    channels_to_exclude: []
    extra:
      sampling_frequency_hz: 20_000_000
      resample_length: 500
      glob_pattern: "*/lvout*.txt"
